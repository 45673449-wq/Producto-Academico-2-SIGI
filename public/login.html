<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión – SIGI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0d1b6e 0%, #1a237e 45%, #283593 100%);
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .card-header {
      background: linear-gradient(135deg, #1a237e, #3949ab);
      padding: 36px 32px 28px;
      text-align: center;
      color: #fff;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 28px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .card-header p {
      font-size: 0.85rem;
      opacity: 0.75;
      margin-top: 4px;
    }

    .card-body {
      padding: 36px 32px 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap span {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 17px;
      pointer-events: none;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 14px 12px 42px;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input:focus {
      border-color: #3949ab;
      box-shadow: 0 0 0 3px rgba(57,73,171,0.15);
      background: #fff;
    }

    .show-pass {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 17px;
      color: #6b7280;
      padding: 0;
    }

    .show-pass:hover { color: #3949ab; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a237e, #3949ab);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 8px;
      letter-spacing: 0.4px;
    }

    .btn-login:hover   { opacity: 0.9; }
    .btn-login:active  { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .alert {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .alert.error {
      background: #fee2e2;
      color: #b91c1c;
      border: 1px solid #fca5a5;
    }

    .alert.success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .hint {
      margin-top: 20px;
      background: #f3f4f6;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.78rem;
      color: #6b7280;
    }

    .hint strong { color: #374151; display: block; margin-bottom: 4px; }
    .hint code {
      background: #e5e7eb;
      padding: 1px 5px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 0.82rem;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer-text {
      text-align: center;
      margin-top: 22px;
      font-size: 0.78rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="logo">🎓</div>
    <h1>SIGI</h1>
    <p>Sistema de Información de Gestión Institucional</p>
  </div>

  <div class="card-body">
    <div class="alert" id="alerta"></div>

    <form id="formLogin" novalidate>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrap">
          <span>📧</span>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="usuario@sigi.edu.pe"
            autocomplete="email"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <span>🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="show-pass" id="togglePass" aria-label="Mostrar contraseña">👁️</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">Iniciar sesión</button>
    </form>

    <div class="hint">
      <strong>Usuarios de prueba:</strong>
      <span>Admin: <code>admin@sigi.edu.pe</code> / <code>admin123</code></span><br/>
      <span>Docente: <code>maria@continental.edu.pe</code> / <code>maria123</code></span>
    </div>

    <p class="footer-text">Universidad Continental &copy; 2026</p>
  </div>
</div>

<script>
  const form      = document.getElementById('formLogin');
  const alerta    = document.getElementById('alerta');
  const btnLogin  = document.getElementById('btnLogin');
  const togglePass = document.getElementById('togglePass');
  const passInput = document.getElementById('password');

  togglePass.addEventListener('click', () => {
    const visible = passInput.type === 'text';
    passInput.type = visible ? 'password' : 'text';
    togglePass.textContent = visible ? '👁️' : '🙈';
  });

  function mostrarAlerta(tipo, mensaje) {
    alerta.className = `alert ${tipo}`;
    alerta.textContent = mensaje;
    alerta.style.display = 'block';
  }

  function ocultarAlerta() {
    alerta.style.display = 'none';
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    ocultarAlerta();

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) {
      mostrarAlerta('error', 'Por favor completa todos los campos.');
      return;
    }

    btnLogin.disabled = true;
    btnLogin.innerHTML = '<span class="spinner"></span>Verificando...';

    try {
      const resp = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });

      const data = await resp.json();

      if (data.ok) {
        mostrarAlerta('success', `¡Bienvenido, ${data.usuario.nombre}! Redirigiendo...`);
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1200);
      } else {
        mostrarAlerta('error', data.mensaje || 'Credenciales incorrectas.');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Iniciar sesión';
      }
    } catch (err) {
      mostrarAlerta('error', 'Error de conexión. Inténtalo de nuevo.');
      btnLogin.disabled = false;
      btnLogin.textContent = 'Iniciar sesión';
    }
  });
</script>

</body>
</html>
